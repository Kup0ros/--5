<!DOCTYPE html>
<html>
<head>
    <title>Вислови авторів</title>
    <meta charset="utf-8">

</head>
<body>
    <h2>Про Батьківщину та патріотизм. Про рідну мову, українську пісню</h2>

    <input type="button" value="Л. Костенко" 
           onclick="showQuote('Нації вмирають не від інфаркту. Спочатку їм відбирає мову.')">
           
    <input type="button" value="Т. Шевченко" 
           onclick="showQuote('Нема на світі України, немає другого Дніпра')">
           
    <input type="button" value="П. Чубинський" 
           onclick="showQuote('Ще не вмерла України і слава, і воля.')">
           
    <input type="button" value="Л. Толстой" 
           onclick="showQuote('Я дуже люблю народну українську мову, звучну, барвисту й таку м\'яку.')">
           
    <input type="button" value="В. Голобородько" 
           onclick="showQuote('Мова вмирає, коли наступне покоління втрачає розуміння значення слів.')">

    <script language="javascript">
        function showQuote(message) {
            alert(message);
        }
    </script>
</body>
</html>
